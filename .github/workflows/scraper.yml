name: Uber Eats Vegan Deal Finder

on:
  schedule:
    - cron: '0 13,20 * * *'
  workflow_dispatch: {} # manual override for testing; no inputs needed

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scrape.js

      - name: Commit and push deals.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update vegan deals ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
